    <style>
        .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .nav-desktop.active { color: #005a9c; font-weight: 700; border-bottom: 2px solid #005a9c; }
        .nav-mobile.active { color: #005a9c; font-weight: 700; }

        /* ====== ANIMASI BUKU RESPONSIF ====== */
        /* Kontainer Utama - Default Mobile (Potret) */
        .responsive-book-area {
            display: flex; flex-direction: column; width: 100%; max-width: 600px; 
            margin: 0 auto; position: relative; background: #fff; border-radius: 1rem; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.1); min-height: 80vh; overflow: hidden;
        }
        /* Efek Lipatan Kertas (Aktif di Mobile) */
        .page-flip-curl { position: relative; }
        .page-flip-curl::after {
            content: ''; position: absolute; bottom: 0; right: 0; width: 0px; height: 0px;
            background: linear-gradient(135deg, rgba(255,255,255,1) 30%, rgba(229,231,235,1) 50%, rgba(156,163,175,0.5) 100%);
            box-shadow: -5px -5px 10px rgba(0,0,0,0.1); border-radius: 0 0 1rem 0;
            transition: width 0.4s ease, height 0.4s ease, border-radius 0.4s ease; z-index: 10;
        }
        .page-flip-curl.flipping::after { width: 120px; height: 120px; border-radius: 100% 0 1rem 0; }

        /* Desktop Mode (Landscape & 3D Flip) - Layar > 768px */
        @media (min-width: 768px) {
            .responsive-book-area { max-width: 1100px; min-height: 70vh; }
            .page-flip-curl::after { display: none; } /* Matikan lipatan kertas di Desktop */
            
            .book-flip-out { animation: turnPageOut 0.5s forwards ease-in; transform-origin: left center; }
            .book-flip-in { animation: turnPageIn 0.5s forwards ease-out; transform-origin: left center; }
            
            @keyframes turnPageOut { 0% { transform: perspective(1500px) rotateY(0deg); opacity: 1; } 100% { transform: perspective(1500px) rotateY(-90deg); opacity: 0; } }
            @keyframes turnPageIn { 0% { transform: perspective(1500px) rotateY(90deg); opacity: 0; } 100% { transform: perspective(1500px) rotateY(0deg); opacity: 1; } }
        }
        .book-gutter { position: absolute; top: 0; bottom: 0; left: 50%; width: 2px; background: rgba(0,0,0,0.03); box-shadow: 0 0 10px rgba(0,0,0,0.1); z-index: 5; transform: translateX(-50%); }
    </style>

    <script>
        let userData = null; let allModules = []; let currentModuleData = []; let currentPartIndex = -1; 
        let activeModuleId = ""; let currentQuizzes = []; let currentQuizIndex = 0; 
        let earnedPoints = 0; let userAnswers = {}; let chatInterval = null; let myUserChart = null;
        let isTTSActive = true; 

window.onload = async function() { 
    // 1. Jalankan konfigurasi fitur luar (seperti TTS)
    await checkTTSConfig();
    
    // 2. Cek penyimpanan lokal (Local Storage) untuk fallback UI agar tidak berkedip
    const localData = localStorage.getItem('healthlearn_user');
    if (localData) {
        userData = JSON.parse(localData);
        updateUIForUser(); // Tampilkan UI seolah login sementara memvalidasi
    }

    // 3. Pasang "Radar" penangkap event Auth (Paling Krusial untuk Google Login)
    supabaseClient.auth.onAuthStateChange(async (event, session) => {
        if (event === 'SIGNED_IN' && session) {
            // Ketika token dari URL berhasil dibaca oleh Supabase
            await handleUserSession(session);
        } else if (event === 'SIGNED_OUT') {
            localStorage.removeItem('healthlearn_user');
            userData = null;
            updateUIForUser();
        }
    });

    // 4. Pengecekan sesi statis (untuk user yang sudah login sebelumnya)
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (session) {
        await handleUserSession(session);
    } else if (localData) { 
        // Validasi keaslian data lokal jika tidak ada sesi Supabase Auth
        const { data: fresh } = await supabaseClient.from('users').select('*').eq('id', userData.id);
        if (fresh?.length) { 
            userData = fresh[0]; 
            localStorage.setItem('healthlearn_user', JSON.stringify(userData)); 
            updateUIForUser();
        } else { 
            localStorage.removeItem('healthlearn_user'); 
            userData = null; 
            updateUIForUser(); 
        }
    } 
    
    // 5. Muat konten halaman
    loadModules(); 
    checkMentorStatus();
};

// Fungsi khusus untuk menangani proses sinkronisasi data user Google ke tabel public.users
async function handleUserSession(session) {
    try {
        // Cek apakah user Google ini sudah tercatat di tabel kita
        let { data: uData, error: selectErr } = await supabaseClient.from('users').select('*').eq('email', session.user.email);
        
        if (selectErr) console.error("Error cek data user:", selectErr);

        // Jika user belum ada di tabel, daftarkan!
        if (!uData || uData.length === 0) {
            const newUser = { 
                nama_lengkap: session.user.user_metadata.full_name || session.user.email.split('@')[0], 
                email: session.user.email, 
                role: 'user', 
                total_points: 0 
            };
            
            const { error: insertErr } = await supabaseClient.from('users').insert([newUser]);
            
            if (insertErr) {
                console.error("GAGAL MENDAFTARKAN USER GOOGLE:", insertErr.message);
                alert("Gagal masuk! Silakan cek pengaturan RLS INSERT di Supabase Anda.");
                return; // Stop eksekusi agar tidak terjadi error lanjutan
            }
            
            // Ambil ulang data yang baru saja berhasil di-insert
            const { data: freshData } = await supabaseClient.from('users').select('*').eq('email', session.user.email);
            uData = freshData;
        }
        
        // Jika data berhasil didapat, tetapkan sebagai user aktif
        if (uData?.length) { 
            userData = uData[0]; 
            localStorage.setItem('healthlearn_user', JSON.stringify(userData)); 
            updateUIForUser(); // Perbarui Navbar dan Tab
        }
    } catch (err) {
        console.error("Fatal Error pada Session Handling:", err);
    }
}

        // TTS & UI Init
        async function checkTTSConfig() {
            try { const { data } = await supabaseClient.from('app_configs').select('value').eq('key', 'tts_enabled').single(); if (data) isTTSActive = (data.value === 'true'); } catch (e) { console.warn(e); }
        }

        function updateUIForUser() { 
            const isLogin = (userData !== null);
            document.getElementById('desktop-tabs').classList.remove('hidden');
            const dr = document.getElementById('tab-desk-rapor'); if(dr) dr.classList.toggle('hidden', !isLogin);
            
            document.getElementById('mobile-nav').classList.remove('hidden');
            const mr = document.getElementById('tab-mob-rapor'); if(mr) mr.classList.toggle('hidden', !isLogin);
            
            document.getElementById('btn-login-menu').classList.toggle('hidden', isLogin);
            document.getElementById('btn-profil-menu').classList.toggle('hidden', !isLogin);
            document.getElementById('btn-logout-menu').classList.toggle('hidden', !isLogin);
            document.getElementById('user-status-text').innerText = isLogin ? userData.nama_lengkap.split(' ')[0] : 'Tamu';
            document.getElementById('user-points-text').innerText = isLogin ? (userData.total_points || 0) + " Pts" : '';
            if(isLogin && userData.role === 'admin') { const ad = document.getElementById('admin-dropdown-btn'); if(ad) ad.classList.remove('hidden'); }
        }

        // View Navigation
        function switchView(viewName) {
            if(!userData && viewName !== 'beranda') { openAuthModal(); return; }
            document.querySelectorAll('.app-view').forEach(v => v.classList.add('hidden'));
            document.getElementById('view-' + viewName).classList.remove('hidden');
            window.scrollTo(0,0);
            document.querySelectorAll('.nav-desktop, .nav-mobile').forEach(b => b.classList.remove('active', 'text-primary'));
            const dBtn = document.getElementById('tab-desk-' + viewName); if(dBtn) dBtn.classList.add('active');
            const mBtn = document.getElementById('tab-mob-' + viewName); if(mBtn) mBtn.classList.add('active', 'text-primary');
            document.getElementById('profile-dropdown').classList.add('hidden');
            if(viewName === 'rapor') loadUserChart();
            if(viewName === 'profil') { document.getElementById('ep-nama').value = userData.nama_lengkap; document.getElementById('ep-nohp').value = userData.nomor_hp || ''; document.getElementById('ep-email').value = userData.email; }
            if(viewName === 'mentoring') {
                loadMentoring(); const sel = document.getElementById('m-module');
                sel.innerHTML = '<option value="" disabled selected>Pilih Topik...</option><option value="Umum">Umum</option>';
                allModules.forEach(mod => sel.innerHTML += `<option value="${mod.title}">${mod.title}</option>`);
            }
        }

        // Auth
        function toggleAuthMode() { 
            const regFields = document.getElementById('reg-fields');
            const isReg = !regFields.classList.toggle('hidden'); 
            document.getElementById('modal-title').innerText = isReg ? 'Daftar SiRasa' : 'Masuk SiRasa'; 
            document.getElementById('btn-auth').innerText = isReg ? 'Buat Akun' : 'Masuk Sekarang';
            document.getElementById('toggle-text').innerText = isReg ? 'Sudah punya akun? Masuk' : 'Daftar Akun Baru';
            document.getElementById('auth-pass').value = '';
        }
        function openAuthModal() { 
            document.getElementById('auth-modal').classList.remove('hidden'); 
            document.getElementById('reg-fields').classList.add('hidden');
            document.getElementById('modal-title').innerText = 'Masuk SiRasa';
            document.getElementById('btn-auth').innerText = 'Masuk Sekarang';
            document.getElementById('toggle-text').innerText = 'Daftar Akun Baru';
        }
        function closeAuthModal() { document.getElementById('auth-modal').classList.add('hidden'); }
        async function loginWithGoogle() { const { error } = await supabaseClient.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin } }); if(error) alert("Gagal: " + error.message); }
        async function logout() { await supabaseClient.auth.signOut(); localStorage.removeItem('healthlearn_user'); location.reload(); }
        function toggleProfileMenu(e) { e.stopPropagation(); document.getElementById('profile-dropdown').classList.toggle('hidden'); }
        window.onclick = () => document.getElementById('profile-dropdown').classList.add('hidden');

        document.getElementById('authForm').onsubmit = async (e) => {
            e.preventDefault(); 
            const isReg = !document.getElementById('reg-fields').classList.contains('hidden');
            const btn = document.getElementById('btn-auth'); 
            const email = document.getElementById('auth-email').value; 
            const pass = document.getElementById('auth-pass').value;

            if(isReg) {
                btn.innerText = "Membuat Akun...";
                const { error } = await supabaseClient.from('users').insert([{ 
                    nama_lengkap: document.getElementById('reg-nama').value, email, nomor_hp: document.getElementById('reg-nohp').value, 
                    jenis_kelamin: document.getElementById('reg-jk').value, tanggal_lahir: document.getElementById('reg-tgl-lahir').value, password_hash: pass, role: 'user', total_points: 0 
                }]);
                if(!error) { alert("Sukses! Silakan Masuk."); toggleAuthMode(); } else { alert("Gagal. Email mungkin sudah terdaftar."); btn.innerText = "Buat Akun"; }
            } else {
                btn.innerText = "Memeriksa...";
                const { data } = await supabaseClient.from('users').select('*').eq('email', email).eq('password_hash', pass);
                if(data?.length) { userData = data[0]; localStorage.setItem('healthlearn_user', JSON.stringify(userData)); location.reload(); } 
                else { alert("Data tidak cocok."); btn.innerText = "Masuk Sekarang"; }
            }
        };

        // Mentoring
        async function checkMentorStatus() { const { data } = await supabaseClient.from('users').select('id').eq('role', 'admin').eq('mentor_active', true); if(data?.length) document.querySelectorAll('.mentoring-tab-btn').forEach(t => t.classList.remove('hidden')); }
        async function loadMentoring() {
            const { data } = await supabaseClient.from('mentoring').select('*').eq('user_id', userData.id).order('created_at', { ascending: false });
            const list = document.getElementById('mentoring-list'); list.innerHTML = '';
            data?.forEach(d => list.innerHTML += `<div class="p-5 border border-gray-100 rounded-2xl bg-white shadow-sm flex justify-between items-center"><div><p class="font-bold text-gray-800">${d.topic}</p><p class="text-xs text-gray-400 mt-1">${new Date(d.schedule).toLocaleString()}</p></div><button onclick="openChat('${d.id}')" class="bg-primary text-white text-xs font-bold px-5 py-2.5 rounded-xl shadow-md hover:bg-blue-700">Chat</button></div>`);
        }
        document.getElementById('mentoringForm').onsubmit = async (e) => {
    e.preventDefault();
    const { error } = await supabaseClient.from('mentoring').insert([{ 
        user_id: userData.id, 
        topic: document.getElementById('m-topic').value, 
        module_title: document.getElementById('m-module').value, 
        is_anonymous: document.getElementById('m-anonim').checked, 
        status: 'pending' 
    }]);
    if(!error) { alert("Pertanyaan terkirim!"); location.reload(); }
};
        // Chat
        function openChat(id) { document.getElementById('chat-modal').classList.remove('hidden'); document.getElementById('active-chat-id').value = id; loadChat(id); chatInterval = setInterval(() => loadChat(id), 3000); }
        function closeChat() { document.getElementById('chat-modal').classList.add('hidden'); clearInterval(chatInterval); }
        async function loadChat(id) {
            const { data } = await supabaseClient.from('mentoring_chats').select('*').eq('mentoring_id', id).order('created_at', { ascending: true });
            const box = document.getElementById('chat-box'); box.innerHTML = '';
            data?.forEach(c => { const isMe = c.sender_id === userData.id; box.innerHTML += `<div class="max-w-[85%] p-3 rounded-2xl text-sm ${isMe ? 'bg-primary text-white self-end rounded-tr-sm' : 'bg-gray-100 text-gray-800 self-start rounded-tl-sm'} shadow-sm"><p class="font-black text-[9px] uppercase mb-1 opacity-70">${c.sender_name}</p><p>${c.message}</p></div>`; });
            box.scrollTop = box.scrollHeight;
        }
        document.getElementById('chatForm').onsubmit = async (e) => { e.preventDefault(); const msg = document.getElementById('chat-msg').value; const id = document.getElementById('active-chat-id').value; document.getElementById('chat-msg').value = ''; await supabaseClient.from('mentoring_chats').insert([{ mentoring_id: id, sender_id: userData.id, sender_name: userData.nama_lengkap, message: msg }]); loadChat(id); };
async function checkUserNotif() {
    if(!userData) return;
    // Cek apakah ada sesi chat yang sedang aktif/dibalas admin
    const { data } = await supabaseClient.from('mentoring').select('id').eq('user_id', userData.id).eq('status', 'active');
    const hasNotif = data && data.length > 0;

    const deskNotif = document.getElementById('notif-desk');
    const mobNotif = document.getElementById('notif-mob');
    if(deskNotif) deskNotif.classList.toggle('hidden', !hasNotif);
    if(mobNotif) mobNotif.classList.toggle('hidden', !hasNotif);
}
        // Modules & Learning
        async function loadModules() { 
            const { data } = await supabaseClient.from('modules').select('*').order('created_at', { ascending: false });
            if(data) { allModules = data; const c = document.getElementById('course-container'); c.innerHTML = ''; data.forEach(m => c.innerHTML += `<div class="bg-white rounded-[2rem] overflow-hidden border border-gray-100 shadow-sm cursor-pointer hover:shadow-lg transition flex flex-col" onclick="checkAccess('user', '${m.id}', '${m.title}')"><img src="${m.media_url}" class="h-44 w-full object-cover"><div class="p-6 flex flex-col flex-grow"><span class="text-[10px] font-black uppercase text-primary mb-2">${m.category}</span><h3 class="font-bold text-gray-800 line-clamp-2 text-lg">${m.title}</h3><button class="w-full mt-4 py-3 bg-blue-50 text-primary font-bold rounded-xl transition hover:bg-primary hover:text-white">Mulai Belajar</button></div></div>`); } 
        }

        async function checkAccess(page, id, title) {
            if(!userData) { openAuthModal(); return; }
            activeModuleId = id; document.getElementById('learning-view').classList.remove('hidden'); document.body.style.overflow = 'hidden'; 
            const { data } = await supabaseClient.from('module_contents').select('*').eq('module_id', id).order('order_index', { ascending: true }); 
            currentModuleData = data || []; currentPartIndex = -1; renderPart(); 
        }

        function renderPart() {
            if(!currentModuleData.length) return alert("Kosong.");
            const area = document.getElementById('material-area');
            area.classList.remove('page-flip-curl', 'flipping', 'book-flip-in', 'book-flip-out'); void area.offsetWidth; area.classList.add('book-flip-in'); area.innerHTML = '';

            const bookContainer = document.createElement('div'); bookContainer.className = "responsive-book-area"; area.appendChild(bookContainer);
            const gutter = document.createElement('div'); gutter.className = "book-gutter hidden md:block"; bookContainer.appendChild(gutter);
            const contentWrapper = document.createElement('div'); contentWrapper.className = "material-content-wrapper flex flex-col"; bookContainer.appendChild(contentWrapper);

            const mediaContainer = document.createElement('div'); mediaContainer.id = "media-container";
            const partTitle = document.createElement('h2'); partTitle.id = "part-title"; partTitle.className = "text-3xl font-black text-gray-800 mb-8 border-l-4 border-primary pl-4";
            const partBody = document.createElement('div'); partBody.id = "part-body"; partBody.className = "text-gray-700 text-lg leading-relaxed prose max-w-none md:columns-2 md:gap-16";
            contentWrapper.appendChild(mediaContainer); contentWrapper.appendChild(partTitle); contentWrapper.appendChild(partBody);

            const prevBtn = document.getElementById('prev-part'); const nextBtn = document.getElementById('next-part');

            if (currentPartIndex === -1) {
                const modData = allModules.find(m => m.id === activeModuleId);
                document.getElementById('progress-bar').style.width = "0%";
                mediaContainer.className = "relative w-full h-[50vh] md:h-[60vh] bg-gray-900 rounded-2xl overflow-hidden shadow-xl flex items-center justify-center p-8 mb-8 border-4 border-gray-800";
                mediaContainer.innerHTML = `<img src="${modData.media_url || 'https://images.unsplash.com/photo-1505751172107'}" class="absolute inset-0 w-full h-full object-cover opacity-60 mix-blend-overlay"><div class="absolute top-0 left-0 w-4 h-full bg-black/30 border-r border-white/10 shadow-[inset_5px_0_10px_rgba(0,0,0,0.5)]"></div><div class="relative z-10 text-center flex flex-col items-center"><span class="bg-primary text-white text-xs font-black px-3 py-1.5 rounded-lg uppercase tracking-widest">${modData.category || 'Edukasi'}</span><h1 class="text-white text-4xl md:text-5xl font-black mt-6 mb-4 drop-shadow-xl leading-tight px-4">${modData.title}</h1><p class="text-gray-200 text-sm md:text-base max-w-sm font-medium opacity-90">${modData.summary || 'Pelajari modul ini dengan saksama.'}</p></div>`;
                partTitle.className = "hidden"; partBody.innerHTML = "<p class='text-center text-gray-400 mt-12 font-bold'>Silakan buka buku untuk mulai belajar.</p>";
                const btnVoice = document.getElementById('btn-voice-reader'); if(btnVoice) btnVoice.remove();
                prevBtn.classList.add('hidden'); nextBtn.innerHTML = "Buka Buku (Flip) 📖"; nextBtn.onclick = animateAndGoNext;
                return;
            }

            const p = currentModuleData[currentPartIndex]; document.getElementById('progress-bar').style.width = ((currentPartIndex + 1) / currentModuleData.length * 100) + "%";
            mediaContainer.innerHTML = '';
            // Di dalam renderPart(), ubah blok logika ini:
if(p.content_type === 'youtube') { 
    mediaContainer.className = "rounded-xl overflow-hidden mb-8 border shadow-sm aspect-video"; 
    mediaContainer.innerHTML = `<iframe class="w-full h-full" src="${p.content_data}" frameborder="0" allowfullscreen></iframe>`; 
} 
else if(p.content_type === 'pdf') { 
    mediaContainer.className = "rounded-xl overflow-hidden mb-8 border shadow-sm h-[70vh]"; 
    mediaContainer.innerHTML = `<iframe src="${p.content_data}" class="w-full h-full bg-gray-100"></iframe>`; 
}
else if(p.content_type === 'ppt') { 
    mediaContainer.className = "rounded-xl overflow-hidden mb-8 border shadow-sm aspect-video"; 
    mediaContainer.innerHTML = `<iframe src="${p.content_data.includes('http') ? p.content_data : 'https://view.officeapps.live.com/op/embed.aspx?src='+encodeURIComponent(p.content_data)}" class="w-full h-full" frameborder="0"></iframe>`; 
}
else if(p.content_type === 'embed') { 
    // Logika render baru untuk Media Interaktif / Game Eksternal
    mediaContainer.className = "rounded-xl overflow-hidden mb-8 border shadow-sm aspect-[4/3] md:aspect-video w-full bg-gray-50"; 
    mediaContainer.innerHTML = `<iframe src="${p.content_data}" class="w-full h-full" frameborder="0" allowfullscreen="true" mozallowfullscreen="true" webkitallowfullscreen="true"></iframe>`; 
}
else { 
    mediaContainer.className = 'hidden'; 
}
            partTitle.innerText = p.title; partBody.innerHTML = p.content_data;

            const oldBtn = document.getElementById('btn-voice-reader'); if (oldBtn) oldBtn.remove();
            if (p.content_type === 'article' && isTTSActive) {
                const btnVoice = document.createElement('button'); btnVoice.id = 'btn-voice-reader'; btnVoice.innerHTML = '<span class="material-symbols-outlined align-middle mr-2">record_voice_over</span> Dengarkan Materi'; btnVoice.className = 'mb-8 px-5 py-3 bg-blue-50 text-primary font-bold rounded-xl text-sm flex items-center hover:bg-blue-100 transition shadow-sm'; btnVoice.onclick = () => toggleVoiceReader(p.content_data); partBody.parentNode.insertBefore(btnVoice, partBody);
            } else { if(window.responsiveVoice) responsiveVoice.cancel(); }

            prevBtn.classList.remove('hidden'); prevBtn.innerText = "⬅️ Sebelumnya"; prevBtn.onclick = animateAndGoPrev;
            if(currentPartIndex === currentModuleData.length - 1) { nextBtn.innerHTML = "Selesai & Ujian 📝"; nextBtn.onclick = () => { if(window.responsiveVoice) responsiveVoice.cancel(); startQuiz(); }; } 
            else { nextBtn.innerHTML = "Selanjutnya (Flip) ➡️"; nextBtn.onclick = animateAndGoNext; }
            document.getElementById('learning-view').scrollTo(0,0);
        }

        function animateAndGoNext() { if(window.responsiveVoice) responsiveVoice.cancel(); const area = document.getElementById('material-area'); area.classList.add('book-flip-out', 'page-flip-curl'); void area.offsetWidth; area.classList.add('flipping'); setTimeout(() => { currentPartIndex++; renderPart(); }, 450); }
        function animateAndGoPrev() { if(window.responsiveVoice) responsiveVoice.cancel(); const area = document.getElementById('material-area'); area.classList.add('book-flip-out', 'page-flip-curl'); void area.offsetWidth; area.classList.add('flipping'); setTimeout(() => { currentPartIndex--; renderPart(); }, 450); }

        function toggleVoiceReader(text) {
            const btnVoice = document.getElementById('btn-voice-reader');
            if (responsiveVoice.isPlaying()) { responsiveVoice.cancel(); resetVoiceUI(btnVoice); return; }
            const cleanText = text.replace(/<[^>]+>/g, '').trim(); if (!cleanText) return;
            btnVoice.innerHTML = '<span class="material-symbols-outlined align-middle mr-2">stop_circle</span> Berhenti Mendengarkan'; btnVoice.classList.replace('bg-blue-50', 'bg-red-50'); btnVoice.classList.replace('text-primary', 'text-red-500');
            responsiveVoice.speak(cleanText, "Indonesian Female", { rate: 0.95, onend: () => resetVoiceUI(btnVoice) });
        }
        function resetVoiceUI(btn) { btn.innerHTML = '<span class="material-symbols-outlined align-middle mr-2">record_voice_over</span> Dengarkan Materi'; btn.classList.replace('bg-red-50', 'bg-blue-50'); btn.classList.replace('text-red-500', 'text-primary'); }
        function closeLearningView() { if(window.responsiveVoice) responsiveVoice.cancel(); location.reload(); }

        // Quiz
        async function startQuiz() {
            const { data } = await supabaseClient.from('quizzes').select('*').eq('module_id', activeModuleId).order('created_at', { ascending: true });
            if(!data?.length) return closeLearningView();
            currentQuizzes = data; currentQuizIndex = 0; earnedPoints = 0; userAnswers = {};
            document.getElementById('material-area').classList.add('hidden'); document.getElementById('bottom-nav').classList.add('hidden'); document.getElementById('quiz-area').classList.remove('hidden');
            renderQuizQuestion();
        }
        function renderQuizQuestion() {
            const q = currentQuizzes[currentQuizIndex]; document.getElementById('quiz-question').innerText = q.question;
            const c = document.getElementById('quiz-options'); c.innerHTML = '';
            if (q.quiz_type === 'mitos_fakta') {
                ['Mitos', 'Fakta'].forEach(opt => { const sel = userAnswers[currentQuizIndex] === opt ? 'border-primary bg-blue-50' : 'border-gray-200'; c.innerHTML += `<button onclick="userAnswers[${currentQuizIndex}]='${opt}';renderQuizQuestion();" class="w-full p-5 border-2 rounded-2xl text-center font-bold text-lg transition ${sel} hover:bg-gray-50">${opt}</button>`; });
            } else {
                ['A','B','C','D'].forEach(o => { const optText = q['option_'+o.toLowerCase()]; if(optText && optText !== "-") { const sel = userAnswers[currentQuizIndex] === o ? 'border-primary bg-blue-50' : 'border-gray-200'; c.innerHTML += `<button onclick="userAnswers[${currentQuizIndex}]='${o}';renderQuizQuestion();" class="w-full p-4 border-2 rounded-xl text-left font-bold text-sm transition ${sel} hover:bg-gray-50">${o}. ${optText}</button>`; } });
            }
            const next = document.getElementById('btn-next-quiz');
            if(currentQuizIndex === currentQuizzes.length-1) { next.innerText = "Selesai & Cek Skor"; next.onclick = evaluateQuiz; } else { next.innerText = "Selanjutnya"; next.onclick = () => { currentQuizIndex++; renderQuizQuestion(); }; }
        }
        async function evaluateQuiz() {
            earnedPoints = 0; let streak = 0;
            currentQuizzes.forEach((q, i) => { if(userAnswers[i] === q.correct_answer) { streak++; earnedPoints += 20 + (streak > 1 ? 5 : 0); } else streak = 0; });
            const { data: prog } = await supabaseClient.from('user_progress').select('*').eq('user_id', userData.id).eq('module_id', activeModuleId);
            if(prog?.length) { if(earnedPoints > prog[0].score) { await supabaseClient.from('user_progress').update({ score: earnedPoints }).eq('id', prog[0].id); await supabaseClient.from('users').update({ total_points: userData.total_points + (earnedPoints - prog[0].score) }).eq('id', userData.id); } } 
            else { await supabaseClient.from('user_progress').insert([{ user_id: userData.id, module_id: activeModuleId, score: earnedPoints }]); await supabaseClient.from('users').update({ total_points: userData.total_points + earnedPoints }).eq('id', userData.id); }
            alert(`Selesai! Skor Anda: ${earnedPoints}`); location.reload();
        }

        async function loadUserChart() {
            const { data } = await supabaseClient.from('user_progress').select('score, modules(title)').eq('user_id', userData.id);
            if(!data?.length) return; const ctx = document.getElementById('userProgressChart').getContext('2d'); if(myUserChart) myUserChart.destroy();
            myUserChart = new Chart(ctx, { type: 'bar', data: { labels: data.map(d => d.modules?.title.substring(0,12)+'...'), datasets: [{ label: 'Skor', data: data.map(d => d.score), backgroundColor: '#005a9c', borderRadius: 8 }] }, options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, max: 100 } } } });
        }
    </script>
</body>
